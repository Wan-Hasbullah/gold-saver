            </div>
            
            <div id="modalContent" class="p-6 md:p-8 space-y-4 text-gray-300 leading-relaxed text-sm md:text-base selection:bg-amber-400/20">
                </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/artikel-data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            hydrateArticles();
        });

        function hydrateArticles() {
            const grid = document.getElementById("artikelGrid");
            if(!grid) return;
            grid.innerHTML = "";

            DATA_ARTIKEL.forEach(art => {
                const card = document.createElement("div");
                card.className = "bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl flex flex-col justify-between space-y-4 hover:border-zinc-700 transition-all duration-300";
                card.innerHTML = `
                    <div class="space-y-2">
                        <span class="text-[10px] font-mono font-bold tracking-widest text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 py-0.5 rounded uppercase">${art.date}</span>
                        <h3 class="text-base font-bold text-white tracking-tight leading-snug">${art.title}</h3>
                        <p class="text-xs text-gray-400 line-clamp-3">${art.excerpt}</p>
                    </div>
                    <button onclick="fetchArticlePayload('${art.slug}', '${art.date}')" class="inline-flex items-center space-x-2 text-xs font-bold text-amber-400 hover:text-amber-500 tracking-wider uppercase transition-colors pt-2 cursor-pointer w-fit">
                        <span>Baca Lagi</span> <i class="fa-solid fa-angle-right"></i>
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // CLIENT-SIDE ASYNC FRACTURE ENJIN FETCH DATA
        async function fetchArticlePayload(slug, date) {
            const modal = document.getElementById("articleModal");
            const container = document.getElementById("modalContent");
            const dateBadge = document.getElementById("modalDate");
            
            if(!modal || !container || !dateBadge) return;
            
            dateBadge.textContent = date;
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 space-y-3">
                    <i class="fa-solid fa-circle-notch text-2xl text-amber-400 animate-spin"></i>
                    <p class="text-xs text-gray-500 font-mono tracking-wider uppercase">Mendapatkan fail snippet kekayaan...</p>
                </div>
            `;
            
            // Paparkan Container Modal dengan transisi lancar
            modal.classList.remove("hidden");
            
            try {
                // Fetch fail HTML hancuran mengikut corak rekabentuk GitHub Pages
                const response = await fetch(`kandungan-artikel/${slug}.html`);
                
                if(!response.ok) {
                    throw new Error(`Gagal memuat fail: Status HTTP ${response.status}`);
                }
                
                const rawHTML = await response.text();
                // Suntikan terus kandungan ke tetingkap modal pop-up (SPA Experience)
                container.innerHTML = rawHTML;
                
            } catch (error) {
                // Pengecualian Ralat Sistem Jika Fail Tiada / Isu Rangkaian
                container.innerHTML = `
                    <div class="text-center py-8 space-y-4">
                        <i class="fa-solid fa-triangle-exclamation text-3xl text-rose-500"></i>
                        <h4 class="text-sm font-bold text-white">Ralat Pemuatan Data Asynchronous</h4>
                        <p class="text-xs text-gray-400 max-w-xs mx-auto">Sistem tidak berjaya melakukan panggilan AJAX ke direktori kandungan asal. Sila pastikan pelayan berjalan lancar.</p>
                        <p class="text-[10px] font-mono bg-zinc-950 p-2 rounded text-rose-400/80">${error.message}</p>
                    </div>
                `;
            }
        }

        function closeArticleModal() {
            const modal = document.getElementById("articleModal");
            if(modal) modal.classList.add("hidden");
        }
    </script>
