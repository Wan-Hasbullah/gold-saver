<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Kebijaksanaan Kewangan - Gold Saver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-gray-400 min-h-screen">

    <nav class="sticky top-0 z-50 bg-zinc-900/90 backdrop-blur-md border-b border-zinc-800 px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="text-amber-400 font-black text-xl tracking-wider uppercase flex items-center gap-2">
            <i class="fa-solid fa-chevron-left text-sm text-gray-400"></i> Gold Saver
        </a>
        <div class="support-btn-wrapper relative">
            <div id="studyBubble" class="absolute bottom-[-45px] right-0 bg-amber-400 text-zinc-950 text-xs font-bold px-3 py-1.5 rounded-xl shadow-lg opacity-0 transform translate-y-2 transition-all duration-500 ease-in-out whitespace-nowrap pointer-events-none z-50">Daftar Percuma</div>
            <button id="fabSupportBtn" class="p-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full transition-all duration-300 focus:outline-none">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path class="steam steam-1" d="M9 4C9 4 7.5 5.5 9 7C10.5 8.5 9 10 9 10" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
                    <path class="steam steam-2" d="M13 3C13 3 11.5 4.5 13 6C14.5 7.5 13 9 13 9" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M18 10H4C2.89543 10 2 10.8954 2 12V15C2 18.3137 4.68629 21 8 21H14C17.3137 21 20 18.3137 20 15V12C20 10.8954 19.1046 10 18 10Z" fill="#FFFFFF" />
                    <path d="M20 12C20 12 22 12 22 14.5C22 17 20 17 20 17" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
                </svg>
            </button>
            <div id="fabPopup" class="hidden absolute right-0 mt-3 w-60 bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl p-2 z-50">
                <a href="https://pg2u.my/wanhasbullah/cara-bermula" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-3 py-2.5 text-sm text-white hover:bg-zinc-800 rounded-lg"><i class="fa-solid fa-user-plus text-amber-400 w-5"></i> Daftar Percuma</a>
                <a href="https://pgdealer-wanhasbullah.pages.dev/chat-assist-faq" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-3 py-2.5 text-sm text-white hover:bg-zinc-800 rounded-lg"><i class="fa-solid fa-comments text-amber-400 w-5"></i> Chat</a>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 md:max-w-4xl">
        <header class="mb-8">
            <h1 class="text-2xl font-extrabold text-white">Blog Kebijaksanaan Kewangan</h1>
            <p class="text-xs text-gray-500 mt-1">Urusan pembacaan modular analitik ekonomi dan simpanan emas fizikal.</p>
        </header>

        <div id="artikelGrid" class="space-y-4 pb-16">
            </div>
    </main>

    <div id="readingModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 opacity-0 pointer-events-none transition-all duration-300 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-lg max-h-[80vh] flex flex-col shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="p-4 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/50">
                <span id="modalDate" class="text-[10px] uppercase font-bold tracking-wider text-amber-400 bg-zinc-800 px-2 py-0.5 rounded">Tarikh</span>
                <button id="closeModalBtn" class="text-zinc-400 hover:text-white p-1 rounded-lg hover:bg-zinc-800 transition-colors focus:outline-none">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto text-sm text-gray-300 space-y-4 leading-relaxed">
                </div>
        </div>
    </div>

    <script src="js/artikel-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        const artikelGrid = document.getElementById('artikelGrid');
        const readingModal = document.getElementById('readingModal');
        const modalContainer = readingModal.querySelector('.transform');
        const modalBody = document.getElementById('modalBody');
        const modalDate = document.getElementById('modalDate');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Hidrasi Senarai Kad Artikel
        function hydrateArticles() {
            artikelGrid.innerHTML = '';
            ARTIKEL_DATA.forEach(art => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 p-5 rounded-2xl shadow-xl flex flex-col justify-between hover:border-zinc-700 transition-all";
                card.innerHTML = `
                    <div>
                        <span class="text-[10px] uppercase font-bold tracking-wider text-amber-400 bg-zinc-800 px-2 py-0.5 rounded">${art.date}</span>
                        <h2 class="text-base font-bold text-white mt-2.5 mb-1.5 leading-snug">${art.title}</h2>
                        <p class="text-xs text-gray-500 line-clamp-2">${art.summary}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-zinc-800/50 flex justify-end">
                        <button onclick="fetchArticleContent('${art.id}', '${art.date}')" class="text-xs font-bold text-amber-400 hover:text-amber-500 inline-flex items-center gap-1 focus:outline-none cursor-pointer">
                            Baca Lagi <i class="fa-solid fa-arrow-right text-[10px]"></i>
                        </button>
                    </div>
                `;
                artikelGrid.appendChild(card);
            });
        }

        // Asynchronous Fetch (Single Page Experience Engine)
        async function fetchArticleContent(id, date) {
            // Sediakan keadaan pemuatan (Loading state)
            modalDate.textContent = date;
            modalBody.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 text-zinc-500 gap-3">
                    <i class="fa-solid fa-spinner-third animate-spin text-2xl text-amber-400"></i>
                    <p class="text-xs tracking-wider font-medium">Memuatkan kandungan premium...</p>
                </div>`;
            
            // Buka Modal dengan Animasi
            readingModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => modalContainer.classList.remove('scale-95'), 10);

            try {
                const response = await fetch(`kandungan-artikel/${id}.html`);
                if (!response.ok) throw new Error('Fail kandungan gagal diakses.');
                const htmlText = await response.text();
                modalBody.innerHTML = htmlText;
            } catch (error) {
                modalBody.innerHTML = `
                    <div class="text-center py-8 text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                        <p class="text-sm font-bold">Ralat Pemuatan Data</p>
                        <p class="text-xs text-zinc-500 mt-1">${error.message}</p>
                    </div>`;
            }
        }

        function closeModal() {
            modalContainer.classList.add('scale-95');
            setTimeout(() => readingModal.classList.add('opacity-0', 'pointer-events-none'), 300);
        }

        closeModalBtn.addEventListener('click', closeModal);
        readingModal.addEventListener('click', (e) => { if(e.target === readingModal) closeModal(); });

        window.addEventListener('DOMContentLoaded', hydrateArticles);
    </script>
</body>
</html>
