    <script src="js/shared.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            hydrateVideos();
        });

        function hydrateVideos() {
            const grid = document.getElementById("videoGrid");
            if(!grid) return;
            grid.innerHTML = ""; // Set semula grid kontainer

            DATA_VIDEO.forEach(video => {
                let mediaElement = "";

                // Susun atur Kontainer mengikut Platform API
                if(video.platform === "youtube") {
                    mediaElement = `
                        <div class="aspect-video w-full bg-zinc-950">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${video.videoId}" title="${video.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    `;
                } else if(video.platform === "tiktok") {
                    mediaElement = `
                        <div class="w-full bg-zinc-950 flex justify-center items-center py-2" style="aspect-ratio: 9/16; max-height: 550px;">
                            <iframe class="w-full h-full rounded-xl" src="https://www.tiktok.com/player/v1/${video.videoId}?music_info=1&description=1" allow="autoplay; encrypted-media" allowfullscreen scrolling="no"></iframe>
                        </div>
                    `;
                }

                const wrapper = document.createElement("div");
                wrapper.className = `video-card bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden transition-all duration-300 shadow-xl flex flex-col justify-between`;
                wrapper.setAttribute("data-category", video.category);
                
                wrapper.innerHTML = `
                    ${mediaElement}
                    <div class="p-4 space-y-2">
                        <span class="inline-block text-[10px] font-bold uppercase bg-zinc-800 text-amber-400 px-2 py-0.5 rounded tracking-wider">${video.category}</span>
                        <h3 class="text-sm font-bold text-white line-clamp-2">${video.title}</h3>
                    </div>
                `;
                grid.appendChild(wrapper);
            });
        }

        function filterVideos(category) {
            // Urus status aktif butang penapis
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-amber-400', 'text-zinc-950', 'active');
                btn.classList.add('bg-zinc-900', 'text-gray-400');
            });
            event.currentTarget.classList.add('bg-amber-400', 'text-zinc-950', 'active');
            event.currentTarget.classList.remove('bg-zinc-900', 'text-gray-400');

            // Penguatkuasaan Tapis Kelas Hidden Element
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                if(category === 'all' || card.getAttribute('data-category') === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
